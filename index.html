<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clean Hub - Skuad Lapangan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <div id="login-page">
        <h2>Smart Clean Hub</h2>
        <p>Silakan masuk menggunakan akun Skuad Lapangan</p>
        <div class="login-form">
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <button id="btn-login">Masuk Aplikasi</button>
        </div>
    </div>

    <header id="main-header">
        <div class="header-row-top">
            <div>
                <h2 id="user-display-nama">Memuat Nama...</h2>
                <p id="user-display-gedung">📍 Memuat Lokasi...</p>
            </div>
            <button id="btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i> Keluar
            </button>
        </div>

        <div class="header-row-stats">
            <div class="stat-box-left">
                <span class="stat-label">Shift Kerja</span>
                <div id="karyawan-shift-label">-</div>
            </div>
            <div class="stat-box-right">
                <span class="stat-label">Total Kehadiran</span>
                <div id="total-hari-kerja">0 Hari</div>
            </div>
        </div>

        <div class="header-row-absen">
            <div id="absen-status">Memuat Status Presensi...</div>
            <div class="absen-actions">
                <button id="btn-trigger-absen-masuk" class="btn-success"><i class="fa-solid fa-camera"></i> Absen Masuk</button>
                <button id="btn-trigger-absen-pulang" class="btn-danger"><i class="fa-solid fa-camera"></i> Absen Pulang</button>
            </div>
        </div>
    </header>

    <main id="karyawan-section">
        <button class="btn-emergency-sos" onclick="window.triggerSosSystem()">
            <i class="fa-solid fa-triangle-exclamation"></i> Emergency / SOS System
        </button>

        <div class="menu-grid">
            <div class="menu-item" onclick="window.bukaMenu('tugas')">
                <div class="menu-icon icon-tugas">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <span class="menu-title">Tugas Skuad</span>
            </div>

            <div class="menu-item" onclick="window.bukaMenu('sop')">
                <div class="menu-icon icon-sop">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <span class="menu-title">SOP & RKB</span>
            </div>

            <div class="menu-item" onclick="window.bukaMenu('isu')">
                <div class="menu-icon icon-isu">
                    <i class="fa-solid fa-circle-exclamation"></i>
                </div>
                <span class="menu-title">Laporan Isu</span>
            </div>

            <div class="menu-item" onclick="window.bukaMenu('chemical')">
                <div class="menu-icon icon-chemical">
                    <i class="fa-solid fa-flask"></i>
                </div>
                <span class="menu-title">Log Chemical</span>
            </div>
        </div>

        <div id="admin-section">
            Halaman Utama Monitor Pengawas Aktif.
        </div>
    </main>

</div>

    <script type="module" src="app.js"></script>
</body>
</html>
